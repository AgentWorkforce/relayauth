name = "relayauth-local"
main = "packages/server/src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "relayauth"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "packages/server/src/db/migrations"

[[kv_namespaces]]
binding = "REVOCATION_KV"
id = "00000000000000000000000000000000"

[durable_objects]
bindings = [
  { name = "IDENTITY_DO", class_name = "IdentityDO" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["IdentityDO"]
