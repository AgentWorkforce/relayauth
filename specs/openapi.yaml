openapi: 3.1.0
info:
  title: relayauth API
  version: 1.0.0
  summary: Identity and authorization plane for the Agent Relay ecosystem.
  description: |-
    relayauth issues JWTs, manages identities, evaluates roles and policies,
    enforces scoped access, and exposes audit and admin APIs for the Agent Relay ecosystem.
license:
  name: UNLICENSED
servers:
  - url: http://localhost:8787
    description: Local development
  - url: https://api.relayauth.dev
    description: Production
tags:
  - name: Health
  - name: Tokens
  - name: JWKS
  - name: Identities
  - name: Scopes
  - name: Roles
  - name: Policies
  - name: Audit
  - name: API Keys
  - name: Admin
security:
  - BearerAuth: []
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Public health endpoint for local and hosted deployments.
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Service health status
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/health:
    get:
      tags: [Health]
      summary: Versioned health check
      description: Public health endpoint under the versioned API namespace.
      operationId: getVersionedHealth
      security: []
      responses:
        "200":
          description: Service health status
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /.well-known/jwks.json:
    get:
      tags: [JWKS]
      summary: Get JSON Web Key Set
      description: Public signing keys for offline JWT validation.
      operationId: getJwks
      security: []
      responses:
        "200":
          description: JSON Web Key Set
          headers:
            Cache-Control:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JWKSResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/tokens:
    post:
      tags: [Tokens]
      summary: Issue token pair
      description: Issue a new access and refresh token pair for an identity.
      operationId: createToken
      x-required-scopes: [relayauth:token:create]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/XWorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTokenRequest"
      responses:
        "201":
          description: Token pair created
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/tokens/refresh:
    post:
      tags: [Tokens]
      summary: Refresh token pair
      description: Exchange a refresh token for a new token pair.
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Refreshed token pair
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/tokens/revoke:
    post:
      tags: [Tokens]
      summary: Revoke token or identity tokens
      description: Revoke a specific token, a session, or all tokens for an identity.
      operationId: revokeToken
      x-required-scopes: [relayauth:token:manage]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeTokenRequest"
      responses:
        "204":
          description: Token(s) revoked
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/tokens/validate:
    post:
      tags: [Tokens]
      summary: Validate token
      description: Validate and introspect a token, optionally checking required scopes.
      operationId: validateToken
      x-required-scopes: [relayauth:token:read]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateTokenRequest"
      responses:
        "200":
          description: Token validation result
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateTokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/tokens/{identityId}:
    get:
      tags: [Tokens]
      summary: List active tokens for identity
      description: List active token metadata for an identity without returning raw JWTs.
      operationId: listIdentityTokens
      x-required-scopes: [relayauth:token:read]
      parameters:
        - $ref: "#/components/parameters/IdentityId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Active tokens
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedTokenMetadataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/identities:
    post:
      tags: [Identities]
      summary: Create identity
      description: Create a new agent, human, or service identity.
      operationId: createIdentity
      x-required-scopes: [relayauth:identity:manage]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIdentityRequest"
      responses:
        "201":
          description: Identity created
          headers:
            X-Request-Id:
              $ref: "#/components/headers/X-Request-Id"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentIdentity"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      tags: [Identities]
      summary: List identities
      description: List identities with optional filters for status, type, and workspace.
      operationId: listIdentities
      x-required-scopes: [relayauth:identity:read]
      parameters:
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/IdentityStatus"
        - in: query
          name: type
          schema:
            $ref: "#/components/schemas/IdentityType"
        - in: query
          name: workspaceId
          schema:
            type: string
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Identities page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedIdentityResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/identities/{identityId}:
    get:
      tags: [Identities]
      summary: Get identity
      description: Retrieve a single identity by ID.
      operationId: getIdentity
      x-required-scopes: [relayauth:identity:read]
      parameters:
        - $ref: "#/components/parameters/IdentityId"
      responses:
        "200":
          description: Identity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentIdentity"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
    patch:
      tags: [Identities]
      summary: Update identity
      description: Update mutable fields on an identity.
      operationId: updateIdentity
      x-required-scopes: [relayauth:identity:manage]
      parameters:
        - $ref: "#/components/parameters/IdentityId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIdentityRequest"
      responses:
        "200":
          description: Updated identity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentIdentity"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags: [Identities]
      summary: Delete identity
      description: Hard delete intended only for identities without durable audit history.
      operationId: deleteIdentity
      x-required-scopes: [relayauth:identity:manage]
      parameters:
        - $ref: "#/components/parameters/IdentityId"
      responses:
        "204":
          description: Identity deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/identities/{identityId}/suspend:
    post:
      tags: [Identities]
      summary: Suspend identity
      description: Temporarily deactivate an identity. Can be reactivated later.
      operationId: suspendIdentity
      x-required-scopes: [relayauth:identity:manage]
      parameters:
        - $ref: "#/components/parameters/IdentityId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuspendIdentityRequest"
      responses:
        "200":
          description: Suspended identity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentIdentity"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/identities/{identityId}/reactivate:
    post:
      tags: [Identities]
      summary: Reactivate identity
      description: Reactivate a suspended identity. Retired identities cannot be reactivated.
      operationId: reactivateIdentity
      x-required-scopes: [relayauth:identity:manage]
      parameters:
        - $ref: "#/components/parameters/IdentityId"
      responses:
        "200":
          description: Reactivated identity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentIdentity"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/identities/{identityId}/retire:
    post:
      tags: [Identities]
      summary: Retire identity
      description: Permanently deactivate an identity and revoke all active tokens.
      operationId: retireIdentity
      x-required-scopes: [relayauth:identity:manage]
      parameters:
        - $ref: "#/components/parameters/IdentityId"
      responses:
        "200":
          description: Retired identity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentIdentity"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/identities/{identityId}/sub-agents:
    post:
      tags: [Identities]
      summary: Create sub-agent
      description: Create a child identity with scopes intersected against the parent identity.
      operationId: createSubAgent
      x-required-scopes: [relayauth:identity:manage]
      parameters:
        - $ref: "#/components/parameters/IdentityId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubAgentRequest"
      responses:
        "201":
          description: Sub-agent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSubAgentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      tags: [Identities]
      summary: List sub-agents
      description: List child identities of a parent identity.
      operationId: listSubAgents
      x-required-scopes: [relayauth:identity:read]
      parameters:
        - $ref: "#/components/parameters/IdentityId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Sub-agent page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedIdentityResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/identities/{identityId}/budget:
    get:
      tags: [Identities]
      summary: Get behavioral budget
      operationId: getIdentityBudget
      x-required-scopes: [relayauth:identity:read]
      parameters:
        - $ref: "#/components/parameters/IdentityId"
      responses:
        "200":
          description: Budget state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      tags: [Identities]
      summary: Set behavioral budget
      operationId: setIdentityBudget
      x-required-scopes: [relayauth:identity:manage]
      parameters:
        - $ref: "#/components/parameters/IdentityId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetBudgetRequest"
      responses:
        "200":
          description: Updated budget state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/scopes/validate:
    post:
      tags: [Scopes]
      summary: Validate scope string
      operationId: validateScope
      x-required-scopes: [relayauth:scope:read]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateScopeRequest"
      responses:
        "200":
          description: Parsed scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParsedScope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/scopes/templates:
    get:
      tags: [Scopes]
      summary: List scope templates
      operationId: listScopeTemplates
      x-required-scopes: [relayauth:scope:read]
      responses:
        "200":
          description: Predefined scope templates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScopeTemplatesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/scopes/check:
    post:
      tags: [Scopes]
      summary: Check effective scope access
      operationId: checkScope
      x-required-scopes: [relayauth:scope:read]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckScopeRequest"
      responses:
        "200":
          description: Scope access result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckScopeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/roles:
    post:
      tags: [Roles]
      summary: Create role
      operationId: createRole
      x-required-scopes: [relayauth:role:manage]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleRequest"
      responses:
        "201":
          description: Role created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      tags: [Roles]
      summary: List roles
      operationId: listRoles
      x-required-scopes: [relayauth:role:read]
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
        - in: query
          name: builtIn
          schema:
            type: boolean
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Role page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedRoleResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/roles/{roleId}:
    get:
      tags: [Roles]
      summary: Get role
      operationId: getRole
      x-required-scopes: [relayauth:role:read]
      parameters:
        - $ref: "#/components/parameters/RoleId"
      responses:
        "200":
          description: Role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
    patch:
      tags: [Roles]
      summary: Update role
      description: Built-in roles cannot be modified.
      operationId: updateRole
      x-required-scopes: [relayauth:role:manage]
      parameters:
        - $ref: "#/components/parameters/RoleId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleRequest"
      responses:
        "200":
          description: Updated role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
