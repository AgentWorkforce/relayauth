components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT issued by relayauth.
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Organization API key used for token issuance.
  headers:
    X-Request-Id:
      description: Request identifier echoed or generated by the service.
      schema:
        type: string
    X-RateLimit-Limit:
      description: Max requests in the current rate limit window.
      schema:
        type: integer
    X-RateLimit-Remaining:
      description: Remaining requests in the current window.
      schema:
        type: integer
    X-RateLimit-Reset:
      description: UTC epoch second when the current rate limit window resets.
      schema:
        type: integer
    Retry-After:
      description: Seconds to wait before retrying after rate limit exhaustion.
      schema:
        type: integer
  parameters:
    Cursor:
      in: query
      name: cursor
      schema:
        type: string
      description: Opaque pagination cursor.
    Limit:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
      description: Number of items to return.
    IdentityId:
      in: path
      name: identityId
      required: true
      schema:
        type: string
      description: Identity identifier.
    RoleId:
      in: path
      name: roleId
      required: true
      schema:
        type: string
    PolicyId:
      in: path
      name: policyId
      required: true
      schema:
        type: string
    EntryId:
      in: path
      name: entryId
      required: true
      schema:
        type: string
    ExportId:
      in: path
      name: exportId
      required: true
      schema:
        type: string
    ApiKeyId:
      in: path
      name: apiKeyId
      required: true
      schema:
        type: string
    XWorkspaceId:
      in: header
      name: X-Workspace-Id
      required: false
      schema:
        type: string
      description: Optional workspace context override.
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication failed or missing credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated but not authorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource state conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TooManyRequests:
      description: Rate limited
      headers:
        Retry-After:
          $ref: "#/components/headers/Retry-After"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      type: object
      required: [type, title, status, code, message]
      properties:
        type:
          type: string
          format: uri-reference
          example: https://relayauth.dev/errors/invalid-scope
        title:
          type: string
          example: Invalid scope
        status:
          type: integer
          example: 403
        code:
          type: string
          example: invalid_scope
        message:
          type: string
          example: Scope 'relayfile:fs:delete:*' is not granted to this identity.
        details:
          type: object
          additionalProperties: true
        requestId:
          type: string
    Pagination:
      type: object
      required: [hasMore]
      properties:
        cursor:
          type: string
          nullable: true
        hasMore:
          type: boolean
        limit:
          type: integer
    RelayAuthTokenClaims:
      type: object
      required: [sub, org, wks, scopes, iss, aud, exp, iat, jti]
      properties:
        sub:
          type: string
        org:
          type: string
        wks:
          type: string
        scopes:
          type: array
          items:
            type: string
        iss:
          type: string
        aud:
          type: array
          items:
            type: string
        exp:
          type: integer
        iat:
          type: integer
        jti:
          type: string
        sid:
          type: string
        meta:
          type: object
          additionalProperties:
            type: string
        sponsor:
          type: string
        sponsorChain:
          type: array
          items:
            type: string
        parentTokenId:
          type: string
        budget:
          $ref: "#/components/schemas/TokenBudget"
    TokenBudget:
      type: object
      properties:
        maxActionsPerHour:
          type: integer
        remaining:
          type: integer
    TokenPair:
      type: object
      required:
        - accessToken
        - refreshToken
        - accessTokenExpiresAt
        - refreshTokenExpiresAt
        - tokenType
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        accessTokenExpiresAt:
          type: string
          format: date-time
        refreshTokenExpiresAt:
          type: string
          format: date-time
        tokenType:
          type: string
          enum: [Bearer]
    JWKSResponse:
      type: object
      required: [keys]
      properties:
        keys:
          type: array
          items:
            $ref: "#/components/schemas/Jwk"
    Jwk:
      type: object
      additionalProperties: true
      properties:
        kid:
          type: string
        kty:
          type: string
        alg:
          type: string
        use:
          type: string
        n:
          type: string
        e:
          type: string
        crv:
          type: string
        x:
          type: string
        y:
          type: string
    IdentityStatus:
      type: string
      enum: [active, suspended, retired]
    IdentityType:
      type: string
      enum: [agent, human, service]
    AgentIdentity:
      type: object
      required:
        - id
        - name
        - type
        - orgId
        - status
        - scopes
        - roles
        - metadata
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        type:
          $ref: "#/components/schemas/IdentityType"
        orgId:
          type: string
        workspaceId:
          type: string
        status:
          $ref: "#/components/schemas/IdentityStatus"
        scopes:
          type: array
          items:
            type: string
        roles:
          type: array
